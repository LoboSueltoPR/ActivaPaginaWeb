  <header class="site-header">

      <button class="hamburger" id="hamburger" type="button" aria-label="Abrir menú" aria-controls="mainNav" aria-expanded="false">☰</button>

          <div class="carousel-dots" id="coverageDots" aria-label="Indicadores del carrusel"></div>
